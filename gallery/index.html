<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Kertara</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' fill='black' font-family='sans-serif'%3EK%3C/text%3E%3C/svg%3E">
</head>

<body>

    <div id="navbar-placeholder" class="skeleton-box skeleton-nav"></div>

    <div class="page-wrapper" style="max-width: 1200px;">
        <main class="main-content" style="grid-column: 1 / -1;">
            <h1>Activity Gallery</h1>
            <p>Click on an image to enlarge.</p>

            <div class="gallery-grid">
                <p>No picture here</p>
            </div>
        </main>
    </div>

    <div id="lightbox" class="lightbox">
        <img id="lightbox-content" class="lightbox-content" src="" alt="Enlarge">
    </div>

    <div id="footer-placeholder" class="skeleton-box skeleton-footer"></div>

    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
