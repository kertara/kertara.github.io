<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Kertara</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header class="site-header">
        <div class="nav-container">
            <a href="../index.html" class="brand">Kertara</a>
            <button id="mobile-menu-btn" class="mobile-menu-btn">Menu</button>
        </div>
        <ul id="nav-links" class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../about/">About</a></li>
            <li><a href="../projects/">Projects</a></li>
            <li><a href="../team/">Team</a></li>
            <li><a href="../gallery/">Gallery</a></li>
            <li><a href="../donate/" class="btn-donate">Donate</a></li>
        </ul>
        <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
    </header>

    <div class="page-wrapper" style="max-width: 1200px;">
        <main class="main-content" style="grid-column: 1 / -1;">
            <h1>Activity Gallery</h1>
            <p>Click on an image to enlarge.</p>

            <div class="gallery-grid">

                <div class="gallery-card">
                    <img src="../assets/gallery_1.png" alt="Server Infrastructure" class="gallery-img"
                        onerror="this.src='https://via.placeholder.com/400x300/dddddd/555555?text=Server+Photo'">
                    <div class="gallery-date">May 20, 2026</div>
                </div>

                <div class="gallery-card">
                    <img src="../assets/project_1.png" alt="Network Visualization" class="gallery-img"
                        onerror="this.src='https://via.placeholder.com/400x300/dddddd/555555?text=Network+Photo'">
                    <div class="gallery-date">March 15, 2026</div>
                </div>

                <div class="gallery-card">
                    <img src="../assets/team_1.png" alt="Developer at work" class="gallery-img"
                        onerror="this.src='https://via.placeholder.com/400x300/dddddd/555555?text=Work+Photo'">
                    <div class="gallery-date">November 2, 2025</div>
                </div>

            </div>
        </main>
    </div>

    <!-- Lightbox Element -->
    <div id="lightbox" class="lightbox">
        <img id="lightbox-content" class="lightbox-content" src="" alt="Enlarge">
    </div>

    <footer class="site-footer">
        <p>Email: <a href="mailto:contact@kertara.proton.me">contact@kertara.proton.me</a> | GitHub: <a
                href="https://github.com/kertara">github.com/kertara</a></p>
        <p>&copy; 2026 Kertara Community. All rights reserved.</p>
    </footer>

    <script src="../js/main.js"></script>
</body>

</html>
