<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Kertara</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' fill='black' font-family='sans-serif'%3EK%3C/text%3E%3C/svg%3E">
</head>

<body>

    <div id="navbar-placeholder" class="skeleton-box skeleton-nav"></div>

    <div class="page-wrapper">
        <main class="main-content">
            <h1>Project List</h1>
            <p>Here is the software we are currently developing. Click on a project name to view its details.</p>

            <div class="search-container">
                <input type="text" id="project-search" class="search-input" placeholder="Search project name...">
            </div>

            <div class="project-list">

                <a href="kertara-messenger/" class="project-item">
                    <div class="project-item-header">
                        <span class="project-title">Kertara Messenger</span>
                        <span class="project-status">Active (v0.1.0-alpha)</span>
                    </div>
                    <p class="project-desc">A Python-based application using Tor for secure connectivity.</p>
                </a>

            </div>

        </main>

        <aside class="sidebar">
            <h3>Project Assistance</h3>
            <ul class="sidebar-menu">
                <li><a href="mailto:contact@kertara.app">Report an Issue (Bug)</a></li>
            </ul>
        </aside>
    </div>

    <div id="footer-placeholder" class="skeleton-box skeleton-footer"></div>

    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
